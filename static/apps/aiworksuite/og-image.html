<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: system-ui, -apple-system, sans-serif;
    background: #0F0F1A;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px;
    position: relative;
  }
  .bg-pattern {
    position: absolute;
    inset: 0;
    opacity: 0.05;
    background-image: repeating-linear-gradient(
      45deg, #6366F1 0px, #6366F1 1px, transparent 1px, transparent 20px
    );
  }
  .logo {
    font-size: 28px;
    font-weight: 800;
    color: #6366F1;
    letter-spacing: -1px;
    margin-bottom: 24px;
  }
  .title {
    font-size: 52px;
    font-weight: 800;
    color: #FFFFFF;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 20px;
    max-width: 900px;
  }
  .subtitle {
    font-size: 26px;
    color: rgba(255,255,255,0.7);
    text-align: center;
    max-width: 800px;
  }
  .url {
    position: absolute;
    bottom: 40px;
    right: 60px;
    font-size: 20px;
    color: #6366F1;
    font-weight: 600;
  }
  .badge {
    position: absolute;
    top: 40px;
    right: 60px;
    background: #6366F1;
    color: #0F0F1A;
    padding: 8px 20px;
    border-radius: 50px;
    font-size: 18px;
    font-weight: 700;
  }
</style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="logo">🧠 AIWorkSuite.pro</div>
  <h1 class="title">Tu Asistente de<br>Productividad con IA</h1>
  <p class="subtitle">Gestiona proyectos, tareas y más con inteligencia artificial</p>
  <span class="badge">Gratis · 2026</span>
  <span class="url">aiworksuite.pro</span>
<script defer type='text/javascript' src='https://storage.ko-fi.com/cdn/widget/Widget_2.js'></script><script type='text/javascript'>kofiwidget2.init('Support me on Ko-fi', '#72a4f2', 'E1E41XP6I9');kofiwidget2.draw();</script>
</body>
</html>
