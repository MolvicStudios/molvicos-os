<!doctype html>
<html lang="en" data-theme="noir">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#06090f" />
		<meta name="description" content="Your AI OS. Prompt engineering, local models, and productivity tools." />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Molvicos" />
		<link rel="icon" type="image/png" href="/icons/icon-192.png" />
		<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
		<title>Molvicos — AI Operating System</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
		;(function () {
			var SITE     = 'molvicos.pro'
			var ENDPOINT = 'https://molvicstudios-analytics.josemmolera.workers.dev/track'
			var USER_KEY = 'ms_uid'
			if (location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.hostname.endsWith('.pages.dev') || /bot|crawl|spider|slurp|bingbot|googlebot/i.test(navigator.userAgent)) return
			var isNewUser = !localStorage.getItem(USER_KEY)
			if (isNewUser) localStorage.setItem(USER_KEY, '1')
			var sessionStart = Date.now(), lastActivity = Date.now()
			document.addEventListener('mousemove', function(){ lastActivity = Date.now() }, { passive: true })
			document.addEventListener('keydown', function(){ lastActivity = Date.now() }, { passive: true })
			document.addEventListener('touchstart', function(){ lastActivity = Date.now() }, { passive: true })
			function send(ev, extra) {
				var p = { site: SITE, page: location.pathname, event: ev || 'pageview', referrer: document.referrer, is_new_user: isNewUser }
				if (extra) Object.assign(p, extra)
				fetch(ENDPOINT, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(p), keepalive: true }).catch(function(){})
			}
			if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', function(){ send('pageview') })
			else send('pageview')
			window.addEventListener('beforeunload', function () {
				var d = Math.round((Date.now() - sessionStart) / 1000)
				var a = Math.min(d, Math.round((lastActivity - sessionStart) / 1000))
				if (a > 2) send('session_end', { duration: a })
			})
			window.molvicTrack = function(e) { send(e) }
		})()
		</script>
	</body>
</html>
